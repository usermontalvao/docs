# Serviço de conversão DOCX <-> SFDT do Syncfusion (Word Processor Server).
#
# Este compose sobe DOIS containers:
#   1) word-processor-server  -> o conversor oficial do Syncfusion (interno, porta 80)
#   2) caddy                  -> reverse proxy com HTTPS automático + CORS restrito
#
# O CRM (frontend estático) continua no Render. Só o Import de DOCX do editor
# passa a bater aqui, em vez do endpoint demo público do Syncfusion.
#
# Uso:
#   1) copie .env.server.example para .env.server e preencha as variáveis
#   2) docker compose up -d
#   3) aponte VITE_SYNC_FUSION do CRM para https://SEU_DOMINIO/api/documenteditor/
#
# Veja DEPLOY.md para o passo a passo completo (DNS, TLS, verificação).

services:
  word-processor-server:
    image: syncfusion/word-processor-server:latest
    container_name: docx-word-processor
    restart: unless-stopped
    environment:
      # No Portainer: defina SYNCFUSION_LICENSE_KEY na aba "Environment variables" do stack.
      # No CLI: docker compose --env-file .env.server up -d --build
      SYNCFUSION_LICENSE_KEY: ${SYNCFUSION_LICENSE_KEY}
    expose:
      - "80"                   # só exposto na rede interna; quem publica é o Caddy
    networks:
      - docxnet
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    # O healthcheck depende de curl OU wget existirem na imagem base (.NET aspnet).
    # Se o container ficar marcado como "unhealthy" sem motivo, comente este bloco;
    # o restart:unless-stopped já garante a resiliência.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/api/documenteditor/ >/dev/null 2>&1 || wget -qO- http://localhost:80/api/documenteditor/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  caddy:
    # Imagem custom: Caddy + plugin de rate limit (ver Dockerfile).
    build:
      context: .
      dockerfile: Dockerfile
    image: docx-caddy-ratelimit:local
    container_name: docx-caddy
    restart: unless-stopped
    environment:
      # Opcional: só usado se você ligar o gate por API key no Caddyfile.
      # Vazio = gate desligado. No Portainer, defina na aba "Environment variables".
      DOCX_API_KEY: ${DOCX_API_KEY:-}
    ports:
      # MODO TÚNEL: publica só no localhost, numa porta ALEATÓRIA -> Caddy interno :8080.
      # O túnel (Cloudflare/ngrok) aponta para http://localhost:42811.
      # Trocar a porta aleatória? Mude só o número da esquerda (host).
      - "127.0.0.1:42811:8080"
    volumes:
      # Caddyfile agora é embutido na imagem (COPY no Dockerfile) — sem bind mount.
      - caddy_data:/data       # estado interno do Caddy (não há mais cert TLS aqui)
      - caddy_config:/config
    depends_on:
      - word-processor-server
    networks:
      - docxnet

networks:
  docxnet:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
